name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1️⃣ Проверяем код репозитория
      - name: Checkout code
        uses: actions/checkout@v5

      # 2️⃣ Копируем приватный ключ для SSH
      - name: Copy SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      # 3️⃣ Добавляем host key EC2 в known_hosts
      - name: Add EC2 host key
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # 4️⃣ Проверка соединения с сервером
      - name: Test SSH connection
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes -o ConnectTimeout=30"
          ssh -i ~/.ssh/id_ed25519 $SSH_OPTS ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo 'SSH OK'"

      # 5️⃣ Деплой на сервер
      - name: Deploy App
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes -o ConnectTimeout=30"
          ssh -i ~/.ssh/id_ed25519 $SSH_OPTS ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            mkdir -p ~/project
            cd ~/project

            # Клонируем репозиторий по HTTPS, если его ещё нет
            if [ ! -d ".git" ]; then
              cd ~
              rm -rf ~/project
              mkdir -p ~/project
              cd ~/project
              git clone https://github.com/tarik2454/test-task-Vehicle-Platform-RabbitMQ.git .
            fi

            # Обновляем код
            git fetch origin main
            git reset --hard origin/main

            # Выбираем доступную команду compose
            if sudo docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="sudo docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="sudo docker-compose"
            else
              echo "Docker Compose is not installed on EC2"
              exit 1
            fi

            # Запускаем стек контейнеров
            $COMPOSE_CMD down || true
            $COMPOSE_CMD up -d --build

            # Отображаем итоговый статус контейнеров
            $COMPOSE_CMD ps
          EOF
